<app-header/>
<main>
    <ul id="users">
        @for (user of users; track user.id) {
            <li>
                <app-user [user]="user" (select)="onSelectUser($event)"/>
            </li>
        }
    </ul>

    <!-- @if(selectedUser > -1) {
        <app-tasks [task]="users[selectedUser].task"/>
    } -->

    @if (selectedUser) {
        <app-tasks [task]="selectedUser.task"/>
    } @else {
        <p id="fallback">Select a user</p>
    }
</main>
